<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>
  <style>
    .box  { fill:#eaf2fb; stroke:#2f5c8f; stroke-width:1.5; }
    .term { fill:#e8f5e9; stroke:#2e7d32; stroke-width:1.5; }
    .dec  { fill:#fff8e1; stroke:#b28704; stroke-width:1.5; }
    .pan  { fill:#fdf6f0; stroke:#c77d48; stroke-width:1.5; }
    .t    { font-size:15px; fill:#222; }
    .s    { font-size:12.5px; fill:#555; }
    .lbl  { font-size:13px; font-style:italic; fill:#666; }
    .ttl  { font-size:19px; font-weight:bold; fill:#222; }
    .sub  { font-size:14px; font-weight:bold; fill:#8a4b1d; }
    line, polyline { stroke:#444; stroke-width:1.5; fill:none; }
  </style>

  <text class="ttl" x="220" y="32" text-anchor="middle">floor_int(y): greatest integer &#8804; y</text>

  <ellipse class="term" cx="220" cy="82" rx="80" ry="23"/>
  <text class="t" x="220" y="87" text-anchor="middle">Start: input y</text>
  <line x1="220" y1="105" x2="220" y2="132" marker-end="url(#a)"/>

  <rect class="box" x="115" y="132" width="210" height="54" rx="8"/>
  <text class="t" x="220" y="154" text-anchor="middle">n = int(y)</text>
  <text class="s" x="220" y="174" text-anchor="middle">cuts decimals, toward zero</text>
  <line x1="220" y1="186" x2="220" y2="214" marker-end="url(#a)"/>

  <polygon class="dec" points="220,214 335,270 220,326 105,270"/>
  <text class="t" x="220" y="264" text-anchor="middle">y &lt; 0  and</text>
  <text class="t" x="220" y="285" text-anchor="middle">y not equal n ?</text>

  <polyline points="105,270 55,270 55,362" marker-end="url(#a)"/>
  <text class="lbl" x="78" y="262">yes</text>
  <rect class="box" x="10" y="362" width="110" height="42" rx="8"/>
  <text class="t" x="65" y="388" text-anchor="middle">n = n &#8722; 1</text>

  <polyline points="335,270 395,270 395,440"/>
  <text class="lbl" x="345" y="262">no</text>

  <polyline points="55,404 55,440 220,440"/>
  <polyline points="395,440 220,440"/>
  <line x1="220" y1="440" x2="220" y2="464" marker-end="url(#a)"/>

  <ellipse class="term" cx="220" cy="492" rx="80" ry="24"/>
  <text class="t" x="220" y="497" text-anchor="middle">Return n</text>

  <rect class="pan" x="470" y="55" width="390" height="470" rx="10"/>
  <text class="sub" x="665" y="88" text-anchor="middle">Why F5 needs the floor</text>
  <text class="s" x="490" y="118">Algorithm B splits the exponent x into a</text>
  <text class="s" x="490" y="138">whole part n and a leftover f in [0, 1):</text>
  <text class="t" x="510" y="166">x = n + f,   n = floor_int(x)</text>
  <text class="t" x="490" y="204">Elodie reads her culture at x = 3.5 h:</text>
  <text class="s" x="510" y="228">n = 3 whole doublings (exact, pow_int)</text>
  <text class="s" x="510" y="248">f = 0.5 of a doubling (series, exp and ln)</text>
  <text class="t" x="490" y="286">A reading before time zero, x = &#8722;2.5 h:</text>
  <text class="s" x="510" y="310">int(&#8722;2.5) gives &#8722;2, but the floor is &#8722;3.</text>
  <text class="s" x="510" y="330">With n = &#8722;3 the leftover is</text>
  <text class="s" x="510" y="350">f = x &#8722; n = &#8722;2.5 &#8722; (&#8722;3) = 0.5</text>
  <text class="s" x="510" y="370">which stays inside [0, 1) as required.</text>
  <text class="s" x="510" y="390">With the wrong n = &#8722;2 the leftover would</text>
  <text class="s" x="510" y="410">be &#8722;0.5, outside the range, and the</text>
  <text class="s" x="510" y="430">series step would receive a bad input.</text>
  <text class="t" x="490" y="468">So the one line correction n = n &#8722; 1 is</text>
  <text class="t" x="490" y="490">what keeps negative exponents correct.</text>
</svg>